name: CI (Web)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "dummy"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
          UPSTASH_REDIS_REST_URL: "https://example.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "dummy"
          GROQ_API_KEY: "dummy"
          META_APP_ID: "dummy"
          META_APP_SECRET: "dummy"
          META_WEBHOOK_VERIFY_TOKEN: "dummy"
          META_TOKEN_ENCRYPTION_KEY: "a".repeat(64)
          TIKTOK_CLIENT_KEY: "dummy"
          TIKTOK_CLIENT_SECRET: "dummy"
          TIKTOK_TOKEN_ENCRYPTION_KEY: "a".repeat(64)
          NEXT_PUBLIC_SENTRY_DSN: "https://example.sentry.io"
          SENTRY_AUTH_TOKEN: "dummy"
          SENTRY_ORG: "dummy"
          SENTRY_PROJECT: "dummy"
