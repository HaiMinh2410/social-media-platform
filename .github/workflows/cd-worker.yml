name: CD (Worker)

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - ".github/workflows/cd-worker.yml"
      - "src/infrastructure/worker/**"
      - "src/application/**"
      - "src/domain/**"
      - "prisma/**"
      - "fly.worker.toml"
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "bun.lock"

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    
    # Ensure only one deployment runs at a time
    concurrency: 
      group: deploy-worker-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: "latest"

      - name: Deploy Worker
        run: flyctl deploy --remote-only --config fly.worker.toml --ha=false --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
